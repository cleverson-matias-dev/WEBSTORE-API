services:
  # Banco de Dados
  mysql:
    image: mysql:8.0
    container_name: mysql_dev
    restart: always
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  # API Monolito (Node + TS)
  api:
    build: .
    container_name: node_api_dev
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules # Evita sobrescrever node_modules do container
    environment:
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
    ports:
      - "3000:3000"
    command: npm run dev # Garante que rode o ts-node-dev ou nodemon
    depends_on:
      - mysql

volumes:
  mysql_data:
