name: Node.js CI and Docker Deploy

on:
  pull_request:
    branches: [ develop ]
  push:
    branches: [ develop ]

jobs:
  # 1. Este Job roda tanto no PR quanto no Merge (Push)
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Instalar dependências
        run: npm ci

      - name: Executar Lint
        run: npm run lint

      - name: Executar Testes
        run: npm run tests

  # 2. Este Job SÓ roda no Push (Merge) para develop
  build-docker:
    needs: test-and-lint # Só começa se o teste passar
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      # Facilita a manutenção do nome da imagem
      IMAGE_BASE: ${{ secrets.DOCKERHUB_USERNAME }}/github_pipeline
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push (SHA and Latest)
        env:
          # Define a tag específica para este build
          IMAGE_TAG: ${{ env.IMAGE_BASE }}:${{ github.sha }}
        run: |
          # 1. Builda a imagem usando a tag do commit (SHA)
          docker-compose -f docker-compose.staging.yml build
          
          # 2. Cria a tag 'latest' localmente a partir da que acabou de buildar
          docker tag ${{ env.IMAGE_TAG }} ${{ env.IMAGE_BASE }}:latest
          
          # 3. Sobe ambas para o Docker Hub
          docker push ${{ env.IMAGE_TAG }}
          docker push ${{ env.IMAGE_BASE }}:latest
