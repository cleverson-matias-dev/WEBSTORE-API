paths:
  /catalog/api/v1/categories:
    get:
      operationId: listCategories
      tags: [ Categories ]
      summary: Lista categorias paginadas
      parameters:
      - name: name
        in: query
        required: false
        schema:
          type: string
      - name: limit
        in: query
        schema:
          type: integer # Alterado para integer para tipagem correta no TS
          default: 10
      - name: page
        in: query
        schema:
          type: integer # Alterado para integer para tipagem correta no TS
          default: 1
      responses:
        200:
          description: Lista de categorias retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoriesDTO'
        400:
          $ref: '#/components/responses/BadRequest'
        500:
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createCategory
      tags: [ Categories ]
      summary: Cria uma nova categoria
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryDTO'
      responses:
        201:
          description: Categoria criada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDTO'
        400:
          $ref: '#/components/responses/BadRequest'
        409:
          description: Conflito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        500:
          $ref: '#/components/responses/InternalError'

  /catalog/api/v1/categories/{id}:
    get:
      operationId: getCategoryById
      tags: [ Categories ]
      summary: Busca categoria por ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        200:
          description: Categoria encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryDTO'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/InternalError'

    patch:
      operationId: updateCategory
      tags: [ Categories ]
      summary: Atualiza nome de uma categoria
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ name ] # Garante que o body não seja vazio no TS
              properties:
                name:
                  type: string
                  minLength: 3
      responses:
        204:
          description: Atualizado com sucesso
        400:
          $ref: '#/components/responses/BadRequest'
        404:
          $ref: '#/components/responses/NotFoundError'
        500:
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: deleteCategory
      tags: [ Categories ]
      summary: Remove uma categoria
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        204:
          description: Removido com sucesso
        404:
          $ref: '#/components/responses/NotFoundError'
        409:
          description: Conflito (vínculos existentes)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        500:
          $ref: '#/components/responses/InternalError'

components:
  responses:
    BadRequest:
      description: Erro de validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'
    NotFoundError:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'
    InternalError:
      description: Erro interno
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'

  schemas:
    CategoryDTO:
      type: object
      required: [ id, name, slug, created_at, updated_at ] # parent_id fica fora pois pode ser null/ausente
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        parent_id: { type: string, format: uuid, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateCategoryDTO:
      type: object
      required: [ name, slug ] # Adicionado slug como obrigatório se sua API exigir
      properties:
        name: { type: string, minLength: 3 }
        parent_id: { type: string, format: uuid, nullable: true }
        slug: { type: string }

    PaginatedCategoriesDTO:
      type: object
      required: [ items, total, page, limit ] # Garante data.items.map no front sem erro
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/CategoryDTO'
        total: { type: number }
        page: { type: number }
        limit: { type: number }

    ErrorResponseDTO:
      type: object
      required: [ status, errors ]
      properties:
        status:
          type: string
          example: error
        errors:
          type: array
          items:
            type: string
          example: [ "Mensagens de erro detalhadas aqui" ]
