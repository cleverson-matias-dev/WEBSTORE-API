paths:
  /catalog/api/v1/products:
    get:
      operationId: listProducts
      tags: [ Produtos ]
      summary: Listar produtos de forma paginada
      parameters:
      - in: query
        name: page
        schema: { type: integer, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, default: 10 }
      - in: query
        name: name
        schema: { type: string }
      responses:
        '200':
          description: Lista de produtos recuperada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedProductOutput'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createProduct
      tags: [ Produtos ]
      summary: Criar um novo produto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductInput'
      responses:
        '201':
          description: Produto criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOutputDTO'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          description: Conflito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          $ref: '#/components/responses/InternalError'

  /catalog/api/v1/products/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

    get:
      operationId: getProductById
      tags: [ Produtos ]
      summary: Obter detalhes de um produto
      responses:
        '200':
          description: Dados do produto retornados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOutputDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    patch:
      operationId: patchProduct
      tags: [ Produtos ]
      summary: Atualizar parcialmente os dados de um produto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchProductInput'
      responses:
        '200':
          description: Produto atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOutputDTO'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteProduct
      tags: [ Produtos ]
      summary: Remover um produto do catálogo
      responses:
        '204':
          description: Removido com sucesso.
        '404':
          $ref: '#/components/responses/NotFound'

components:
  responses:
    ErrorResponse:
      description: Erro de validação
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseDTO' }
    NotFound:
      description: Não encontrado
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseDTO' }
    InternalError:
      description: Erro interno
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponseDTO' }

  schemas:
    ErrorResponseDTO:
      type: object
      required: [ status, errors ]
      properties:
        status: { type: string, example: error }
        errors: { type: array, items: { type: string } }

    CreateProductInput:
      type: object
      required: [ name, description, category_id, product_type, visibility, has_variants ]
      properties:
        name: { type: string, minLength: 2 }
        description: { type: string }
        short_description: { type: string }
        category_id: { type: string, format: uuid }
        collection_id: { type: string, format: uuid, nullable: true }
        brand: { type: string }
        slug: { type: string }
        product_type: { type: string, enum: [ simple, variable ] }
        visibility: { type: string, enum: [ catalog, hidden, search ] }
        has_variants: { type: boolean }
        video_url: { type: string, format: uri }
        meta_description_title: { type: string }

    PatchProductInput:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        short_description: { type: string }
        brand: { type: string }
        category_id: { type: string, format: uuid }
        visibility: { type: string, enum: [ catalog, hidden, search ] }
        product_type: { type: string, enum: [ simple, variable ] }
        video_url: { type: string, format: uri }
        meta_description_title: { type: string }

    CategoryDTO:
      type: object
      required: [ id, name, slug ]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        parent_id: { type: string, format: uuid, nullable: true }

    ProductOutputDTO:
      type: object
      required: [ id, name, slug, description, category, category_id, images, skus, has_variants, product_type, visibility, created_at ]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        short_description: { type: string, nullable: true }
        category_id: { type: string, format: uuid }
        category: { $ref: '#/components/schemas/CategoryDTO' }
        brand: { type: string, nullable: true }
        product_type: { type: string }
        visibility: { type: string }
        has_variants: { type: boolean }
        video_url: { type: string, format: uri, nullable: true }
        meta_description_title: { type: string, nullable: true }
        images: { type: array, items: { $ref: '#/components/schemas/ProductImageDTO' } }
        skus: { type: array, items: { $ref: '#/components/schemas/SkuDTO' } }
        created_at: { type: string, format: date-time }

    SkuDTO:
      type: object
      required: [ id, product_id, sku_code, price ]
      properties:
        id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
        sku_code: { type: string }
        price: { type: number }

    ProductImageDTO:
      type: object
      required: [ url, ordem ]
      properties:
        url: { type: string, format: uri }
        ordem: { type: integer }

    PagedProductOutput:
      type: object
      required: [ items, total, page, limit ]
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/ProductOutputDTO' } }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
