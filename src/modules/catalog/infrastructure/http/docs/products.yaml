tags:
- name: Produtos
  description: Endpoints relacionados ao gerenciamento de produtos

paths:
  /catalog/api/v1/products:
    get:
      operationId: listProducts
      tags: [ Produtos ]
      summary: Listar produtos de forma paginada
      parameters:
      - in: query
        name: page
        schema: { type: integer, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, default: 10 }
      - in: query
        name: name
        schema: { type: string }
      - in: query
        name: slug
        schema: { type: string }
      - in: query
        name: description
        schema: { type: string }
      responses:
        '200':
          description: Lista de produtos recuperada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedProductOutput'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalError'

    post:
      operationId: createProduct
      tags: [ Produtos ]
      summary: Criar um novo produto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductInput'
      responses:
        '201':
          description: Produto criado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOutputDTO'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          description: Conflito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          $ref: '#/components/responses/InternalError'

  /catalog/api/v1/products/{id}:
    parameters:
    - name: id
      in: path
      required: true
      schema: { type: string, format: uuid }

    get:
      operationId: getProductById
      tags: [ Produtos ]
      summary: Obter detalhes de um produto
      responses:
        '200':
          description: Dados do produto retornados.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOutputDTO'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      operationId: updateProduct
      tags: [ Produtos ]
      summary: Atualizar dados de um produto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductInput'
      responses:
        '200':
          description: Produto atualizado com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOutputDTO'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: deleteProduct
      tags: [ Produtos ]
      summary: Remover um produto do catálogo
      responses:
        '204':
          description: Removido com sucesso.
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  responses:
    ErrorResponse:
      description: Erro de validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'
    NotFound:
      description: Não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'
    InternalError:
      description: Erro interno
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'

  schemas:
    ErrorResponseDTO:
      type: object
      required: [ status, errors ]
      properties:
        status:
          type: string
          example: error
        errors:
          type: array
          items:
            type: string

    CreateProductInput:
      type: object
      required: [ name, description, category_id ]
      properties:
        name: { type: string, minLength: 2 }
        description: { type: string, minLength: 2 }
        category_id: { type: string, format: uuid }

    UpdateProductInput:
      type: object
      required: [ name, description, category_id ]
      properties:
        name: { type: string }
        description: { type: string }
        category_id: { type: string, format: uuid }

    CategoryDTO:
      type: object
      required: [ id, name, slug ]
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        parent_id: { type: string, format: uuid, nullable: true }

    SkuDTO:
      type: object
      required: [ id, sku_code, quantity, price ]
      properties:
        id: { type: string, format: uuid }
        product_id: { type: string, format: uuid }
        sku_code: { type: string }
        quantity: { type: integer }
        price: { type: number }
        currency: { type: string, default: "BRL" }

    ProductImageDTO:
      type: object
      required: [ url, ordem ]
      properties:
        product_id: { type: string, format: uuid }
        url: { type: string, format: uri }
        ordem: { type: integer }

    ProductOutputDTO:
      type: object
      required: [ id, name, slug, description, category, images, skus ] # Images e SKUs são opcionais
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        description: { type: string }
        category: { $ref: '#/components/schemas/CategoryDTO' }
        images:
          type: array
          items: { $ref: '#/components/schemas/ProductImageDTO' }
        skus:
          type: array
          items: { $ref: '#/components/schemas/SkuDTO' }

    PagedProductOutput:
      type: object
      required: [ items, total, page, limit ]
      properties:
        items:
          type: array
          items: { $ref: '#/components/schemas/ProductOutputDTO' }
        total: { type: integer }
        page: { type: integer }
        limit: { type: integer }
