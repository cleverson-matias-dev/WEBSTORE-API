tags:
- name: Attributes
  description: Gerenciamento de atributos do catálogo
- name: Categories
  description: Gerenciamento de categorias do catálogo
- name: Images
  description: Gerenciamento de imagens dos produtos
- name: Produtos
  description: Gerenciamento de produtos

components:
  schemas:
    ErrorResponse:
      type: object
      properties:
        status:
          type: string
          example: error
        errors:
          type: array
          items:
            type: string
          example: [ "Mensagens de erro detalhadas aqui" ]

  responses:
    StandardError:
      description: Resposta de erro padrão
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

paths:
  # --- Atributos ---
  /catalog/api/v1/attributes:
    get:
      summary: Lista todos os atributos
      tags: [ Attributes ]
      parameters:
      - in: query
        name: name
        schema:
          type: string
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
      - in: query
        name: page
        schema:
          type: integer
          default: 1
      responses:
        200:
          description: Lista de atributos retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAttributesDTO'
        400: { $ref: '#/components/responses/StandardError' }
        500: { $ref: '#/components/responses/StandardError' }
    post:
      summary: Cria um novo atributo
      tags: [ Attributes ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAttributeDTO'
      responses:
        201:
          description: Atributo criado com sucesso
        400: { $ref: '#/components/responses/StandardError' }

  /catalog/api/v1/attributes/{id}:
    get:
      summary: Obtém um atributo pelo ID
      tags: [ Attributes ]
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Atualiza um atributo existente
      tags: [ Attributes ]
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAttributeDTO'
    delete:
      summary: Remove um atributo
      tags: [ Attributes ]
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        204:
          description: Atributo removido com sucesso

  # --- Categorias ---
  /catalog/api/v1/categories:
    get:
      summary: Lista todas as categorias
      tags: [ Categories ]
      responses:
        200:
          description: Lista de categorias retornada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCategoriesDTO'
    post:
      summary: Cria uma nova categoria
      tags: [ Categories ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryDTO'
      responses:
        201:
          description: Categoria criada com sucesso

  /catalog/api/v1/categories/{id}:
    get:
      summary: Obtém uma categoria pelo ID
      tags: [ Categories ]
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Atualiza uma categoria existente
      tags: [ Categories ]
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid

  # --- Imagens ---
  /catalog/api/v1/images:
    get:
      summary: Lista imagens de forma paginada
      tags: [ Images ]
      parameters:
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
      - in: query
        name: page
        schema:
          type: integer
          default: 1
      responses:
        200:
          description: Lista de imagens retornada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedImagesDTO'
        400: { $ref: '#/components/responses/StandardError' }

    post:
      summary: Cria uma nova imagem para um produto
      tags: [ Images ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageDTO'
      responses:
        201:
          description: Imagem criada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponseDTO'
        400: { $ref: '#/components/responses/StandardError' }

  /catalog/api/v1/images/{id}:
    get:
      summary: Obtém uma imagem pelo ID
      tags: [ Images ]
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponseDTO'
        404: { $ref: '#/components/responses/StandardError' }

    patch:
      summary: Atualiza dados de uma imagem (url ou ordem)
      tags: [ Images ]
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImageDTO'
      responses:
        200:
          description: Imagem atualizada com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponseDTO'
        400: { $ref: '#/components/responses/StandardError' }

    delete:
      summary: Remove uma imagem do catálogo
      tags: [ Images ]
      parameters:
      - in: path
        name: id
        required: true
        schema:
          type: string
          format: uuid
      responses:
        204:
          description: Imagem removida com sucesso
        404: { $ref: '#/components/responses/StandardError' }

  # --- Produtos ---
  /catalog/api/v1/products:
    post:
      summary: Criar um novo produto
      tags: [ Produtos ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductInputDto'
      responses:
        '201':
          description: Produto criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOutputDto'
        '400':
          $ref: '#/components/responses/StandardError'
        '404':
          $ref: '#/components/responses/StandardError'
        '409':
          $ref: '#/components/responses/StandardError'

    get:
      summary: Listar produtos com paginação e filtros
      tags: [ Produtos ]
      parameters:
      - in: query
        name: page
        schema: { type: integer, minimum: 1, default: 1 }
      - in: query
        name: limit
        schema: { type: integer, minimum: 1, default: 10 }
      - in: query
        name: name
        schema: { type: string }
      - in: query
        name: slug
        schema: { type: string }
      - in: query
        name: description
        schema: { type: string }
      responses:
        '200':
          description: Lista de produtos retornada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductOutputDto'
                  total: { type: integer }
                  page: { type: integer }
                  limit: { type: integer }
        '400':
          $ref: '#/components/responses/StandardError'

  /catalog/api/v1/products/{id}:
    parameters:
    - in: path
      name: id
      required: true
      schema: { type: string, format: uuid }

    get:
      summary: Obter produto por ID
      tags: [ Produtos ]
      responses:
        '200':
          description: Detalhes do produto
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOutputDto'
        '404':
          $ref: '#/components/responses/StandardError'

    put:
      summary: Atualizar um produto existente
      tags: [ Produtos ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductInputDto'
      responses:
        '200':
          description: Produto atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductOutputDto'
        '400':
          $ref: '#/components/responses/StandardError'
        '404':
          $ref: '#/components/responses/StandardError'
        '409':
          $ref: '#/components/responses/StandardError'

    delete:
      summary: Remover um produto
      tags: [ Produtos ]
      responses:
        '204':
          description: Produto removido com sucesso
        '404':
          $ref: '#/components/responses/StandardError'
        '400':
          $ref: '#/components/responses/StandardError'
