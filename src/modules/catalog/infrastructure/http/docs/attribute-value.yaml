openapi: 3.0.0
info:
  title: SKU Attribute Value API
  description: API para gerenciamento de valores de atributos vinculados a SKUs.
  version: 1.0.0

paths:
  /sku-attributes:
    post:
      summary: Associa um atributo a um SKU
      tags: [ SKU Attributes ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSkuAttributeValueRequestDTO'
      responses:
        201:
          description: Atributo associado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkuAttributeValueResponseDTO'
        400:
          $ref: '#/components/responses/BadRequestError'
        409:
          description: Conflito - Atributo já definido para este SKU
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        500:
          $ref: '#/components/responses/InternalServerError'

  /sku-attributes/sku/{skuId}:
    get:
      summary: Lista todos os atributos de um SKU específico
      tags: [ SKU Attributes ]
      parameters:
      - name: skuId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        200:
          description: Lista de atributos retornada
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SkuAttributeValueResponseDTO'
        400:
          $ref: '#/components/responses/BadRequestError'
        500:
          $ref: '#/components/responses/InternalServerError'

  /sku-attributes/{id}:
    put:
      summary: Atualiza o valor de um atributo de SKU
      tags: [ SKU Attributes ]
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                new_value:
                  type: string
                  example: "Azul Marinho"
      responses:
        200:
          description: Valor atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SkuAttributeValueResponseDTO'
        400:
          $ref: '#/components/responses/BadRequestError'
        404:
          description: Atributo não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        500:
          $ref: '#/components/responses/InternalServerError'

    delete:
      summary: Remove a associação de um atributo com um SKU
      tags: [ SKU Attributes ]
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
      responses:
        204:
          description: Removido com sucesso
        400:
          $ref: '#/components/responses/BadRequestError'
        404:
          description: Atributo não encontrado para remoção
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        500:
          $ref: '#/components/responses/InternalServerError'

components:
  schemas:
    CreateSkuAttributeValueRequestDTO:
      type: object
      required:
      - sku_id
      - attribute_id
      - value
      properties:
        sku_id:
          type: string
          format: uuid
        attribute_id:
          type: string
          format: uuid
        value:
          type: string
          maxLength: 100

    SkuAttributeValueResponseDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        sku_id:
          type: string
          format: uuid
        attribute_id:
          type: string
          format: uuid
        value:
          type: string
        updated_at:
          type: string
          format: date-time

    ErrorResponseDTO:
      type: object
      properties:
        status:
          type: string
          example: "error"
        errors:
          type: array
          items:
            type: string
          example: [ "Mensagem de erro detalhada aqui" ]

  responses:
    BadRequestError:
      description: Erro de validação ou requisição malformada
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'
    InternalServerError:
      description: Erro interno do servidor
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'
