paths:
  /catalog/api/v1/images:
    post:
      operationId: createImage
      summary: Criar nova imagem
      tags: [ Images ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageDTO'
      responses:
        '201':
          description: Imagem criada com sucesso.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflito
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponseDTO'
        '500':
          $ref: '#/components/responses/InternalError'

    get:
      operationId: listImages
      summary: Listar imagens paginadas
      tags: [ Images ]
      parameters:
      - in: query
        name: page
        schema:
          type: integer
          default: 1
      - in: query
        name: limit
        schema:
          type: integer
          default: 10
      responses:
        '200':
          description: Lista de imagens retornada.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedImagesDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalError'

  /catalog/api/v1/images/{id}:
    parameters:
    - in: path
      name: id
      required: true
      schema:
        type: string
        format: uuid

    get:
      operationId: getImageById
      summary: Buscar imagem por ID
      tags: [ Images ]
      responses:
        '200':
          description: Detalhes da imagem.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ImageResponseDTO'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    put:
      operationId: updateImage
      summary: Atualizar imagem
      tags: [ Images ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateImageDTO'
      responses:
        '204':
          description: Atualizado com sucesso.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

    delete:
      operationId: deleteImage
      summary: Deletar imagem
      tags: [ Images ]
      responses:
        '204':
          description: Removido com sucesso.
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

components:
  schemas:
    # --- DTOs de Entrada ---
    CreateImageDTO:
      type: object
      required: [ product_id, url, ordem ]
      properties:
        product_id:
          type: string
          format: uuid
        url:
          type: string
        ordem:
          type: integer

    UpdateImageDTO:
      type: object
      required: [ url, ordem ] # Garante tipagem fixa no front ao atualizar
      properties:
        url:
          type: string
        ordem:
          type: integer

    # --- DTOs de Saída ---
    ImageResponseDTO:
      type: object
      required: [ id, product_id, url, ordem, created_at ]
      properties:
        id:
          type: string
          format: uuid
        product_id:
          type: string
          format: uuid
        url:
          type: string
        ordem:
          type: integer
        created_at:
          type: string
          format: date-time

    PaginatedImagesDTO:
      type: object
      required: [ items, total, page ]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/ImageResponseDTO'
        total:
          type: integer
        page:
          type: integer

    # --- Erros ---
    ErrorResponseDTO:
      type: object
      required: [ status, errors ]
      properties:
        status:
          type: string
          example: "error"
        errors:
          type: array
          items:
            type: string

  responses:
    BadRequest:
      description: Erro de validação
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'
    InternalError:
      description: Erro interno
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponseDTO'
