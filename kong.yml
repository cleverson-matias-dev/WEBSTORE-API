_format_version: "3.0"
_transform: true

services:
- name: node-api
  url: http://api:3000
  routes:
  # 1. Rota PÚBLICA (Register e Login) - Limite por IP para evitar Brute Force
  - name: auth-route
    paths:
    - /identity/api/v1/users/auth/register
    - /identity/api/v1/users/auth/login
    strip_path: false
    plugins:
    - name: rate-limiting
      config:
        minute: 5 # Máximo de 5 tentativas por minuto
        policy: local # Armazena os contadores na memória do Kong (use 'redis' para produção/cluster)
        limit_by: ip # Identifica o usuário pelo endereço IP (já que não há JWT ainda)

  # 2. Rota PROTEGIDA - Limite por Credencial (Consumer)
  - name: protected-api-route
    paths:
    - /
    strip_path: false
    plugins:
    - name: jwt
      config:
        key_claim_name: iss
        claims_to_verify:
        - exp
    - name: request-transformer
      config:
        add:
          headers:
          - "X-Authenticated-Scope: verified"
    # Adicionando Rate Limit na rota protegida
    - name: rate-limiting
      config:
        minute: 100 # 100 requisições por minuto
        hour: 5000 # 5000 requisições por hora
        policy: local
        limit_by: consumer # Como o JWT já identificou o usuário, o limite é por 'Consumer'

consumers:
- username: api-modular-user
  jwt_secrets:
  - key: "api-modular-node"
    secret: "secret"
    algorithm: HS256
