_format_version: "3.0"
_transform: true

services:
- name: node-api
  url: http://api:3000
  # Adicionando o CORS no nível do serviço para cobrir todas as rotas abaixo
  plugins:
  - name: cors
    config:
      origins:
      - "*" # Mude para seu domínio em produção (ex: https://meusite.com)
      methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
      headers:
      - Accept
      - Accept-Version
      - Content-Length
      - Content-MD5
      - Content-Type
      - Date
      - Authorization
      exposed_headers:
      - X-Status-Code
      credentials: true
      max_age: 3600
      preflight_continue: false

  routes:
  # 1. Rota PÚBLICA
  - name: auth-route
    paths:
    - /health
    - /docs
    - /identity/api/v1/users/auth/register
    - /identity/api/v1/users/auth/login
    - /identity/api/v1/users/auth/refresh
    strip_path: false
    plugins:
    - name: rate-limiting
      config:
        minute: 20
        policy: local
        limit_by: ip

  # 2. Rota PROTEGIDA
  - name: protected-api-route
    paths:
    - /
    strip_path: false
    plugins:
    - name: jwt
      config:
        key_claim_name: iss
        claims_to_verify:
        - exp
    - name: request-transformer
      config:
        add:
          headers:
          - "X-Authenticated-Scope: verified"
    - name: rate-limiting
      config:
        minute: 100
        hour: 5000
        policy: local
        limit_by: consumer

consumers:
- username: api-modular-user
  jwt_secrets:
  - key: "api-modular-node"
    secret: "secret"
    algorithm: HS256
